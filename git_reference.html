{cat:"Advanced",flag:"git shortlog -s --all",short:"Contributor commit counts",desc:"Counts total commits per author across all branches.",ex:`git shortlog -s --all | sort -rn`,out:`   134  Jane Doe\n    89  John Smith\n    42  Alice Johnson\n    18  Bob Lee`},
{cat:"Advanced",flag:"git stash show --stat",short:"Stash change stats",desc:"Shows a summary of which files and how many lines changed in a stash.",ex:`git stash show --stat stash@{0}`,out:` src/app.css  | 24 ++++++++++++++++\n src/themes.js | 12 ++++++++\n 2 files changed, 36 insertions(+)`},
{cat:"Advanced",flag:"git log --no-merges",short:"Exclude merge commits",desc:"Shows commit history with merge commits filtered out for a cleaner view.",ex:`git log --no-merges --oneline -8`,out:`8e1c9d2 feat: add auth\n4f2a3b1 fix: token expiry\na1b2c3d chore: cleanup tests\nb2c3d4e feat: add homepage`},
{cat:"Advanced",flag:"git log --merges",short:"Show only merge commits",desc:"Shows only merge commits in the log output.",ex:`git log --merges --oneline`,out:`c3d4e5f Merge branch 'feature/auth' into main\nd4e5f6a Merge pull request #42: add payment`},
{cat:"Advanced",flag:"git diff HEAD -- <file>",short:"Diff file against HEAD",desc:"Shows all uncommitted changes for a specific file compared to the last commit.",ex:`git diff HEAD -- src/auth.js`,out:`diff --git a/src/auth.js b/src/auth.js\n--- a/src/auth.js\n+++ b/src/auth.js\n@@ -14,3 +14,5 @@\n+  // improved error handling\n+  if (!token) throw new Error('No token');`},
{cat:"Advanced",flag:"git commit --dry-run",short:"Simulate a commit",desc:"Shows what would happen if you ran git commit, without actually creating a commit.",ex:`git commit --dry-run`,out:`On branch main\nChanges to be committed:\n  modified: src/auth.js\n(nothing committed — dry run)`},
{cat:"Advanced",flag:"git check-ignore -v <file>",short:"Debug gitignore rules",desc:"Shows which .gitignore rule is causing a file to be ignored.",ex:`git check-ignore -v node_modules/`,out:`.gitignore:3:node_modules/  node_modules/`},
{cat:"Advanced",flag:"git ls-tree HEAD",short:"List tree at commit",desc:"Shows the tree (files and directories) at a given commit, with object hashes.",ex:`git ls-tree HEAD`,out:`100644 blob a1b2c3d README.md\n040000 tree b2c3d4e src\n100644 blob c3d4e5f package.json`},

]; // end CMDS

const catKeys = [...new Set(CMDS.map(c => c.cat))];
let activeCat = "All";
let searchVal = "";

const CAT_COLORS = {
  "Config":      "#f0702a",
  "Init/Clone":  "#4af08a",
  "Snapshot":    "#4aa8f0",
  "Diff":        "#f0c44a",
  "Branch":      "#c44af0",
  "Merge":       "#f04a7a",
  "Remote":      "#4af0d8",
  "Fetch/Pull":  "#a0f04a",
  "Push":        "#f07a4a",
  "Log":         "#4a7af0",
  "Tag":         "#f04acf",
  "Stash":       "#e8a04a",
  "Undo":        "#f04a4a",
  "Rebase":      "#8a4af0",
  "Cherry-pick": "#4af0c4",
  "Bisect":      "#d4f04a",
  "Submodule":   "#f04a9f",
  "Worktree":    "#4ac4f0",
  "Archive":     "#f0d44a",
  "Advanced":    "#90a0b0",
};

function catColor(c){ return CAT_COLORS[c] || "#888"; }

function hexToRgba(hex, a){
  let r=0,g=0,b=0;
  if(hex[0]==="#") hex=hex.slice(1);
  if(hex.length===3){ r=parseInt(hex[0]+hex[0],16); g=parseInt(hex[1]+hex[1],16); b=parseInt(hex[2]+hex[2],16); }
  else { r=parseInt(hex.slice(0,2),16); g=parseInt(hex.slice(2,4),16); b=parseInt(hex.slice(4,6),16); }
  return `rgba(${r},${g},${b},${a})`;
}

function renderCats(){
  const d = document.getElementById("cats");
  d.innerHTML="";
  const all = document.createElement("button");
  all.className="cat-btn"+(activeCat==="All"?" active":"");
  all.textContent="All";
  if(activeCat==="All"){ all.style.background="#f0702a"; all.style.color="#0d0f14"; all.style.borderColor="transparent"; }
  all.onclick=()=>{ activeCat="All"; render(); };
  d.appendChild(all);
  catKeys.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="cat-btn"+(activeCat===c?" active":"");
    btn.textContent=c;
    const col=catColor(c);
    btn.style.borderColor=hexToRgba(col, 0.4);
    btn.style.color=activeCat===c?"#0d0f14":col;
    if(activeCat===c){ btn.style.background=col; btn.style.borderColor="transparent"; }
    btn.onclick=()=>{ activeCat=c; render(); };
    d.appendChild(btn);
  });
}

function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render(){
  const q=searchVal.toLowerCase();
  const filtered=CMDS.filter(c=>{
    const mc=activeCat==="All"||c.cat===activeCat;
    const ms=!q||c.flag.toLowerCase().includes(q)||c.short.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q)||c.ex.toLowerCase().includes(q);
    return mc&&ms;
  });

  renderCats();
  document.getElementById("stats-text").textContent=`Showing ${filtered.length} of ${CMDS.length} commands`;
  document.getElementById("count-badge").textContent=filtered.length;
  document.getElementById("total-count").textContent=CMDS.length+"+";

  const list=document.getElementById("list");
  list.innerHTML="";

  if(!filtered.length){
    list.innerHTML='<div class="empty"><big>⌀</big>No commands match your search.</div>';
    return;
  }

  filtered.forEach((cmd,i)=>{
    const card=document.createElement("div");
    card.className="cmd-card";
    const col=catColor(cmd.cat);
    card.style.borderLeft=`3px solid ${col}`;

    const hdr=document.createElement("div");
    hdr.className="cmd-header";
    hdr.innerHTML=`
      <span class="cmd-badge" style="background:${hexToRgba(col,0.15)};color:${col};border:1px solid ${hexToRgba(col,0.35)}">${escapeHtml(cmd.cat)}</span>
      <span class="cmd-flag">${escapeHtml(cmd.flag)}</span>
      <span class="cmd-short">${escapeHtml(cmd.short)}</span>
      <span class="chevron" id="chev-${i}">&#9654;</span>
    `;

    const body=document.createElement("div");
    body.className="cmd-body";
    body.innerHTML=`
      <p class="cmd-desc">${escapeHtml(cmd.desc)}</p>
      <div class="section-block">
        <div class="block-label">Example</div>
        <div class="code-block">${escapeHtml(cmd.ex)}</div>
      </div>
      <div class="section-block">
        <div class="block-label">Output</div>
        <div class="out-block">${escapeHtml(cmd.out)}</div>
      </div>
    `;

    hdr.onclick=()=>{
      const isOpen=body.classList.contains("open");
      document.querySelectorAll(".cmd-body.open").forEach(b=>b.classList.remove("open"));
      document.querySelectorAll(".chevron").forEach(c=>c.style.transform="");
      if(!isOpen){ body.classList.add("open"); document.getElementById("chev-"+i).style.transform="rotate(90deg)"; }
    };

    card.appendChild(hdr);
    card.appendChild(body);
    list.appendChild(card);
  });
}

document.getElementById("search").oninput=function(){ searchVal=this.value; render(); };

render();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Roadmap — Apna College | Shradha Ma'am</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── TOP NAV ─────────────────────────────────────────────────────────── -->
  <nav class="topnav">
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="topnav-logo">DSA<span> Roadmap</span> ·&nbsp;Apna College</div>

    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search topics, algorithms…" autocomplete="off" />
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="completed">✅ Done</button>
      <button class="filter-btn" data-filter="pending">⏳ Pending</button>
    </div>
  </nav>

  <!-- ─── PROGRESS BANNER ─────────────────────────────────────────────────── -->
  <div class="progress-banner">
    <div class="progress-stats">
      <div class="stat">
        <span class="stat-value" id="global-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="global-total" style="color:var(--muted)">126</span>
        <span class="stat-label">Total</span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="global-bar-fill" style="width:0%"></div>
    </div>
    <span class="progress-pct-badge" id="global-pct">0%</span>

    <div class="progress-actions">
      <button class="btn-progress-action btn-export" id="btn-export" title="Export progress as JSON — open on any device">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export</span>
      </button>
      <button class="btn-progress-action btn-import" id="btn-import" title="Import a previously exported JSON to restore progress">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Import</span>
      </button>
      <input type="file" id="import-file-input" accept=".json" style="display:none" />
    </div>
  </div>

  <!-- ─── APP LAYOUT ───────────────────────────────────────────────────────── -->
  <div id="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">📍 Jump to Section</div>
      <ul id="sidebar-sections"></ul>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <div id="sections-container"></div>
    </main>

  </div>

  <!-- ─── NOTE MODAL ───────────────────────────────────────────────────────── -->
  <div id="note-modal">
    <div class="modal-box">
      <button class="modal-close-btn" id="modal-close" title="Close">✕</button>

      <div class="modal-check">🎉</div>
      <div id="modal-section">Section</div>
      <h2 id="modal-title">Video Title</h2>
      <p id="modal-subtitle">Great job! Add a note about what you learned.</p>

      <textarea
        id="note-textarea"
        placeholder="Write your notes here… key concepts, tricky parts, approaches, time complexities…"
      ></textarea>
      <p class="modal-hint">Ctrl + Enter to save</p>

      <div class="modal-actions">
        <button class="btn-modal-skip" id="modal-skip">Skip for now</button>
        <button class="btn-modal-save" id="modal-save">💾 Save Note</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
